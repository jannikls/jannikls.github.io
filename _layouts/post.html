<body>

  <header class="header-bg">
    <div class="header-content">
      <h1>{{ page.title }}</h1>
      <div class="post-info">
        <span class="date-tag">Published: {{ page.date | date: "%B %-d, %Y" }}<br></span>
        <a href="/"><span class="date-tag">Go to Homepage</span><br></a>
        <a href="#mc_embed_signup"><span class="date-tag">Subscribe Here</span></a>

    </div>
  </header>

  <main class="main-content">
    <div class="body-container">
      <div class="grey-text">
        {{ content }}
      </div>

      <div id="mc_embed_signup" style="margin-left: -20px; padding-top: 10px;">
        <form action="https://jannikschilling.us21.list-manage.com/subscribe/post?u=f89d10e0abc7fbfe9448deecc&amp;id=5ff74561c4&amp;f_id=0078f7e6f0" method="post" id="mc-embedded-subscribe-form" name="mc-embedded-subscribe-form" class="validate" target="_self" novalidate="">
            <div id="mc_embed_signup_scroll"><h3>Subscribe here</h3>
                <div class="indicates-required"><span class="asterisk">*</span> indicates required</div>

            <div id="mce-responses" class="clear foot">
                <div class="response" id="mce-error-response" style="display: none;"></div>
                <div class="response" id="mce-success-response" style="display: none;"></div>
            </div>
        <div aria-hidden="true" style="position: absolute; left: -5000px;">
            /* real people should not fill this in and expect good things - do not remove this or risk form bot signups */

        </div>
            <div class="optionalParent">
                <div class="clear foot">
                    <input type="submit" name="subscribe" id="mc-embedded-subscribe" class="button" value="Subscribe">
                </div>
            </div>
        </div>
    </form>
    </div>
    </div>
    </div>

  </main>

</body>

</html>
